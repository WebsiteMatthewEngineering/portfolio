name: Deploy Portfolio App to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ================================
  # 1️⃣ Build & Push Docker Image
  # ================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # for GHCR
      id-token: write   # for Azure OIDC login
    outputs:
      image-sha: ${{ steps.set-image.outputs.image-sha }}

    steps:
      # Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker image
      - name: Build Docker image
        id: set-image
        run: |
          IMAGE_SHA=${GITHUB_SHA}
          docker build -t ghcr.io/websitematthewengineering/portfolio:latest \
                       -t ghcr.io/websitematthewengineering/portfolio:$IMAGE_SHA ./portfolio/.
          echo "IMAGE_SHA=$IMAGE_SHA" >> $GITHUB_ENV
          echo "::set-output name=image-sha::$IMAGE_SHA"

      # Push Docker image
      - name: Push Docker image
        run: |
          docker push ghcr.io/websitematthewengineering/portfolio:latest
          docker push ghcr.io/websitematthewengineering/portfolio:${{ env.IMAGE_SHA }}


  # ================================
  # 2️⃣ Deploy to Lightsail
  # ================================
  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image-sha: ${{ needs.build.outputs.image-sha }}


  # ================================
  # 2️⃣ Deploy to Azure Container Apps
  # ================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      # Checkout (optional)
      # - name: Checkout repo
      #   uses: actions/checkout@v4

      # https://www.youtube.com/watch?v=Z06OyG4i18w
      # https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure

      # https://portal.azure.com/#view/Microsoft_AAD_IAM/StartboardApplicationsMenuBlade/~/AppAppsPreview/menuId~/null
      # az account list --output table 
      # az ad sp create-for-rbac --role contributor --scopes /subscriptions/<sid> --sdk-auth
      # ^ Output can be used directly as AZURE_CREDENTIALS secret value
      # {
      #   "subscriptionId": "",
      #   "tenant": "",
      #   "clientId": "" # App registration / Service Principal appId = Client ID for authentication purposes.
      # }

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # client-id: ${{ secrets.AZURE_CLIENT_ID }}
          # tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy to Azure Container Apps
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: portfolio
          resourceGroup: myResourceGroup
          imageToDeploy: ghcr.io/websitematthewengineering/portfolio:${{ needs.build.outputs.image-sha }}
          ingress: external
          targetPort: 3000
          # registryUsername: ${{ github.actor }}
          # registryPassword: ${{ secrets.GHCR_PAT }}