name: Build Container

on:
  workflow_dispatch:
  workflow_call:

  # push:
  #   branches: [ main ]

jobs:
  # ================================
  # 1️⃣ Build & Push Docker Image
  # ================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # for GHCR

    steps:
      # Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # docker buildx setup
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          cache-from: type=registry,ref=ghcr.io/websitematthewengineering/portfolio:cache
          cache-to:   type=registry,ref=ghcr.io/websitematthewengineering/portfolio:cache,mode=max
          tags: |
            ghcr.io/websitematthewengineering/portfolio:latest
            ghcr.io/websitematthewengineering/portfolio:${{ github.sha }}

